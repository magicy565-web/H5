<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>工厂入驻 — CNSubscribe</title>
<style>
:root {
  --orange: #ff6b35;
  --orange-light: #ff8a5c;
  --orange-dark: #e85a28;
  --green: #00b578;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --text-primary: #1a1a2e;
  --text-secondary: #555;
  --text-muted: #999;
  --bg: #f7f8fa;
  --bg-white: #ffffff;
  --border: #eee;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
  --font: -apple-system,"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--bg-white);padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;flex-shrink:0}
.topbar-name{font-size:14px;font-weight:700}
.topbar-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.topbar-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}

/* CHAT */
.chat{flex:1;padding:16px;display:flex;flex-direction:column;gap:16px}
.msg{animation:slideUp .3s ease}
.msg-ai{display:flex;gap:10px;align-items:flex-start}
.msg-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px}
.msg-bubble{background:var(--bg-white);border-radius:2px 16px 16px 16px;padding:14px 16px;max-width:calc(100% - 48px);box-shadow:var(--shadow-sm);font-size:14px;line-height:1.7}
.msg-user{display:flex;justify-content:flex-end}
.msg-user .msg-bubble{background:var(--orange);color:#fff;border-radius:16px 2px 16px 16px;box-shadow:0 4px 16px rgba(255,107,53,.25)}

/* Thinking dots */
.think-dots{display:flex;gap:4px;padding:2px 0}
.think-dot{width:7px;height:7px;background:var(--text-muted);border-radius:50%;animation:dotBounce 1.4s ease infinite}
.think-dot:nth-child(2){animation-delay:.2s}
.think-dot:nth-child(3){animation-delay:.4s}

/* Think block (ChatGPT-style collapsible reasoning) */
.think-block{margin:10px 0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.think-toggle{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg);font-size:11px;color:var(--text-muted);cursor:pointer;user-select:none;transition:background .2s}
.think-toggle:hover{background:#eef0f2}
.think-toggle-icon{transition:transform .3s;font-size:10px}
.think-toggle.open .think-toggle-icon{transform:rotate(90deg)}
.think-toggle .think-spinner{width:12px;height:12px;border:1.5px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
.think-toggle.done .think-spinner{display:none}
.think-toggle.done::after{content:'';width:12px;height:12px;background:var(--green);border-radius:50%;flex-shrink:0}
.think-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.think-body.open{max-height:1200px}
.think-inner{padding:10px 12px;font-size:11px;color:var(--text-secondary);line-height:1.8;border-top:1px solid var(--border)}
.think-line{opacity:0;transition:opacity .4s;margin-bottom:5px}
.think-line.show{opacity:1}
.think-line .tl-text{display:inline}
.think-line .tl-label{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-right:4px;font-weight:600}
.think-line .tl-label.search{background:#eff6ff;color:var(--blue)}
.think-line .tl-label.match{background:#fff8f5;color:var(--orange)}
.think-line .tl-label.eval{background:#f5f0ff;color:var(--purple)}
.think-line .tl-label.result{background:#f0faf5;color:var(--green)}
.think-line .tl-highlight{color:var(--orange);font-weight:600}
.think-line .tl-num{font-variant-numeric:tabular-nums;font-weight:700}
.think-cursor{display:inline-block;width:2px;height:13px;background:var(--text-muted);vertical-align:middle;margin-left:1px;animation:blink .6s infinite}

/* FORM */
.form-card{background:var(--bg);border-radius:var(--radius);padding:16px;margin-top:8px}
.form-field{margin-bottom:10px}
.form-label{font-size:13px;font-weight:600;margin-bottom:4px;display:block;color:var(--text-secondary)}
.form-select{width:100%;padding:11px 12px;font-size:14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-white);font-family:var(--font);outline:none;-webkit-appearance:none;transition:border-color .2s}
.form-select:focus{border-color:var(--orange)}
.form-select.error{border-color:#ff4d4f}
.btn-match{display:block;width:100%;padding:13px;margin-top:14px;font-size:15px;font-weight:700;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,53,.3)}
.btn-match:active{transform:scale(.98)}

/* EXPOSURE CARD */
.expo-card{background:linear-gradient(135deg,#1a1a2e,#2d2d52);border-radius:var(--radius);padding:20px;margin:8px 0;color:#fff}
.expo-card-title{font-size:11px;opacity:.5;letter-spacing:1px;text-align:center;margin-bottom:12px}
.expo-row{display:flex;justify-content:space-around}
.expo-item{text-align:center}
.expo-num{font-size:32px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--orange)}
.expo-unit{font-size:11px;opacity:.6;margin-top:2px}
.expo-note{font-size:10px;opacity:.3;margin-top:12px;text-align:center}

/* TIMELINE */
.timeline{margin:4px 0;position:relative}
.tl-phase{position:relative;padding:0 0 0 36px;opacity:0;transform:translateY(12px);transition:all .4s ease}
.tl-phase.show{opacity:1;transform:translateY(0)}
.tl-phase::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:2px;background:var(--border)}
.tl-phase:last-child::before{display:none}
.tl-dot{position:absolute;left:6px;top:4px;width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg-white);transition:all .4s ease;z-index:1}
.tl-phase.active .tl-dot{border-color:var(--orange);background:var(--orange);box-shadow:0 0 0 4px rgba(255,107,53,.15)}
.tl-phase.done .tl-dot{border-color:var(--green);background:var(--green)}
.tl-header{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.tl-week{font-size:12px;font-weight:700;color:var(--orange);white-space:nowrap}
.tl-title{font-size:14px;font-weight:700}
.tl-desc{font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:6px}
.tl-body{padding-bottom:18px}

/* === PHASE 1: Doc chaos === */
.doc-pile{position:relative;height:100px;margin:8px 0;overflow:hidden}
.doc-file{position:absolute;width:56px;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.12);opacity:0;transition:all .7s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.doc-file.show{opacity:1}
.doc-file.collapse{transform:translate(var(--tx),var(--ty)) scale(.2) rotate(0deg) !important;opacity:0}
.doc-file-bar{height:10px;display:flex;align-items:center;padding:0 4px;gap:2px}
.doc-file-bar span{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.5)}
.doc-file-body{flex:1;background:#fff;padding:3px 4px;display:flex;flex-direction:column;gap:2px}
.doc-file-line{height:2px;border-radius:1px;background:#e8e8e8}
.doc-file-name{font-size:6px;color:var(--text-muted);text-align:center;margin-top:2px;white-space:nowrap;overflow:hidden}
.doc-file.pdf .doc-file-bar{background:#e74c3c}
.doc-file.xls .doc-file-bar{background:#27ae60}
.doc-file.ppt .doc-file-bar{background:#e67e22}
.doc-file.doc .doc-file-bar{background:#3498db}
.doc-file.img .doc-file-bar{background:#9b59b6}

/* Merge animation */
.merge-line{text-align:center;padding:6px 0;opacity:0;transition:opacity .4s}
.merge-line.show{opacity:1}
.merge-line-inner{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted)}
.merge-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Built info card */
.built-card{background:var(--bg-white);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;margin:8px 0;opacity:0;transform:translateY(10px) scale(.96);transition:all .5s cubic-bezier(.4,0,.2,1)}
.built-card.show{opacity:1;transform:translateY(0) scale(1);border-color:var(--orange);box-shadow:0 2px 12px rgba(255,107,53,.1)}
.bc-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bc-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.bc-title{flex:1}
.bc-name{font-size:13px;font-weight:700}
.bc-loc{font-size:10px;color:var(--text-muted)}
.bc-badge{font-size:9px;color:var(--green);background:#f0faf5;padding:2px 6px;border-radius:4px;font-weight:600}
.bc-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.bc-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--text-secondary);opacity:0;transform:scale(.8);transition:all .3s ease}
.bc-tag.show{opacity:1;transform:scale(1)}
.bc-stats{display:flex;gap:12px;padding-top:6px;border-top:1px solid var(--border)}
.bc-stat{text-align:center;flex:1}
.bc-stat-num{font-size:14px;font-weight:800;color:var(--orange)}
.bc-stat-label{font-size:8px;color:var(--text-muted)}

/* Lead notification cards */
.lead-feed{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.lead-notif{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:var(--radius-sm);border-left:3px solid transparent;opacity:0;transform:translateX(-12px);transition:all .4s ease}
.lead-notif.show{opacity:1;transform:translateX(0)}
.lead-notif.view{border-left-color:var(--blue)}
.lead-notif.inquiry{border-left-color:var(--orange)}
.lead-notif.fav{border-left-color:var(--purple)}
.ln-icon{font-size:18px;flex-shrink:0}
.ln-body{flex:1;min-width:0}
.ln-text{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ln-meta{font-size:9px;color:var(--text-muted)}
.ln-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:pulse 1.5s infinite}
.ln-dot.blue{background:var(--blue)}
.ln-dot.orange{background:var(--orange)}
.ln-dot.purple{background:var(--purple)}

/* === PHASE 2: Client cards === */
.client-list{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.client-card{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:var(--radius-sm);opacity:0;transform:scale(.95);transition:all .4s ease}
.client-card.show{opacity:1;transform:scale(1)}
.client-card.dimmed{opacity:.3;transform:scale(.92)}
.client-card.highlight{background:#fff8f5;border:1px solid var(--orange);box-shadow:0 1px 6px rgba(255,107,53,.1)}
.cc-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-detail{font-size:9px;color:var(--text-muted)}
.cc-intent{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.cc-intent.high{background:#fff8f5;color:var(--orange)}
.cc-intent.mid{background:var(--bg);color:var(--text-muted)}
.filter-label{font-size:10px;color:var(--text-muted);text-align:center;margin:4px 0;opacity:0;transition:opacity .3s}
.filter-label.show{opacity:1}

/* === PHASE 3: Order notifications === */
.order-feed{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.order-notif{display:flex;align-items:flex-start;gap:8px;padding:10px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-sm);opacity:0;transform:translateY(8px);transition:all .4s ease}
.order-notif.show{opacity:1;transform:translateY(0)}
.on-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.on-icon.sample{background:#eff6ff;color:var(--blue)}
.on-icon.trial{background:#fff8f5;color:var(--orange)}
.on-icon.reorder{background:#f0faf5;color:var(--green)}
.on-body{flex:1}
.on-title{font-size:12px;font-weight:700}
.on-detail{font-size:10px;color:var(--text-secondary);margin-top:1px}
.on-amount{font-size:13px;font-weight:800;flex-shrink:0}
.on-amount.blue{color:var(--blue)}
.on-amount.orange{color:var(--orange)}
.on-amount.green{color:var(--green)}
.on-time{font-size:8px;color:var(--text-muted);margin-top:2px}

/* === PHASE 4: Revenue growth === */
.rev-chart{display:flex;align-items:flex-end;gap:4px;height:64px;margin:8px 0;padding:0 4px}
.rev-bar{flex:1;border-radius:3px 3px 0 0;transition:height .6s cubic-bezier(.4,0,.2,1);position:relative}
.rev-bar-label{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--text-muted);white-space:nowrap}
.rev-bar-val{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;white-space:nowrap;opacity:0;transition:opacity .3s}
.rev-bar-val.show{opacity:1}
.partnership-card{display:flex;align-items:center;gap:8px;padding:10px;background:linear-gradient(135deg,#fff8f5,#fff);border:1.5px solid var(--orange);border-radius:var(--radius-sm);margin:8px 0;opacity:0;transform:scale(.95);transition:all .5s ease}
.partnership-card.show{opacity:1;transform:scale(1)}
.pc-icon{font-size:22px}
.pc-body{flex:1}
.pc-title{font-size:12px;font-weight:700;color:var(--orange)}
.pc-detail{font-size:10px;color:var(--text-secondary)}

/* CTA */
.cta-card{background:var(--bg-white);border:1.5px solid var(--orange);border-radius:var(--radius);padding:16px;margin:8px 0}
.cta-title{font-size:14px;font-weight:700;margin-bottom:2px}
.cta-sub{font-size:12px;color:var(--text-muted);margin-bottom:12px}
.cta-field{margin-bottom:8px}
.cta-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:3px}
.cta-label .req{color:#ff4d4f}
.cta-input{width:100%;padding:10px 12px;font-size:14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-family:var(--font);outline:none;transition:border-color .2s}
.cta-input:focus{border-color:var(--orange);background:#fff}
.cta-input.error{border-color:#ff4d4f}
.btn-submit{display:block;width:100%;padding:13px;margin-top:12px;font-size:15px;font-weight:700;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,53,.3)}
.btn-submit:active{transform:scale(.98)}
.cta-promise{font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 24px;border-radius:8px;font-size:14px;z-index:9999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:#ff4d4f;color:#fff}

@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes breathe{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.01)}}
@keyframes numJump{0%{transform:scale(1)}30%{transform:scale(1.15)}60%{transform:scale(.97)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:rotate(0) translate(0)}25%{transform:rotate(-5deg) translate(-2px,1px)}50%{transform:rotate(3deg) translate(1px,-1px)}75%{transform:rotate(-2deg) translate(-1px,2px)}}
@keyframes breathePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.15)}50%{box-shadow:0 0 12px 4px rgba(255,107,53,.1)}}
.think-block{animation:breathePulse 3s ease infinite}
.think-block.done-anim{animation:none}

/* Multi-skill think sections */
.think-skill{margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(0,0,0,.04)}
.think-skill:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.think-skill-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;font-weight:700;color:var(--text-secondary)}
.think-skill-icon{font-size:12px}
.think-skill-status{margin-left:auto;display:flex;align-items:center;gap:4px}
.think-skill-status .sk-spinner{width:10px;height:10px;border:1.5px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
.think-skill-status.done .sk-spinner{display:none}
.think-skill-status.done::after{content:'\2713';color:var(--green);font-size:10px;font-weight:700}
.think-skill-lines{padding-left:18px}

/* Competition insight card */
.competition-insight{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;margin:8px 0;font-size:11px;color:var(--text-secondary);line-height:1.8;border-left:3px solid var(--purple);opacity:0;transform:translateY(8px);transition:all .4s ease}
.competition-insight.show{opacity:1;transform:translateY(0)}
.competition-insight .ci-title{font-size:12px;font-weight:700;color:var(--text-primary);margin-bottom:4px}
.competition-insight .ci-row{display:flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="topbar-avatar">CN</div>
  <div>
    <div class="topbar-name">CNSubscribe</div>
    <div class="topbar-status"><span class="topbar-dot"></span>在线</div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="msg msg-ai">
    <div class="msg-avatar">CN</div>
    <div class="msg-bubble">
      告诉我你的行业，我帮你算一下每月能带来多少采购商曝光和询盘。
      <div class="form-card" id="formCard">
        <div class="form-field">
          <label class="form-label">产品类目</label>
          <select class="form-select" id="inCat"><option value="">选择类目...</option><option>精密加工</option><option>注塑模具</option><option>电子组装</option><option>五金工具</option><option>家居用品</option><option>纺织服装</option><option>包装印刷</option><option>汽车配件</option><option>医疗器械</option><option value="other">其他</option></select>
        </div>
        <div class="form-field">
          <label class="form-label">月产能</label>
          <select class="form-select" id="inCap"><option value="">选择规模...</option><option>10万以下/月</option><option>10-50万/月</option><option>50-100万/月</option><option>100-500万/月</option><option>500万以上/月</option></select>
        </div>
        <div class="form-field">
          <label class="form-label">城市</label>
          <select class="form-select" id="inCity"><option value="">选择城市...</option><option>深圳</option><option>东莞</option><option>广州</option><option>佛山</option><option>杭州</option><option>宁波</option><option>温州</option><option>苏州</option><option>无锡</option><option>上海</option><option>青岛</option><option>厦门</option><option>泉州</option><option>重庆</option><option>成都</option><option value="other">其他</option></select>
        </div>
        <button class="btn-match" id="matchBtn">开始计算</button>
      </div>
    </div>
  </div>
</div>

</div>

function animateNum(el,from,to,dur){

}

/* Typewriter: streams text char-by-char into el, supports HTML spans */
function typewriter(el,html,speed){
  return new Promise(function(resolve){
    var temp=document.createElement('div');
    temp.innerHTML=html;
    var nodes=[];
    function walk(parent){
      for(var i=0;i<parent.childNodes.length;i++){
        var n=parent.childNodes[i];
        if(n.nodeType===3){
          for(var c=0;c<n.textContent.length;c++) nodes.push({type:'char',ch:n.textContent[c]});
        }else if(n.nodeType===1){
          nodes.push({type:'open',tag:n.tagName.toLowerCase(),cls:n.className,style:n.getAttribute('style')||''});
          walk(n);
          nodes.push({type:'close'});
        }
      }
    }
    walk(temp);
    var idx=0;
    var stack=[];
    function tick(){
      if(idx>=nodes.length){resolve();return}
      var node=nodes[idx];
      var target=stack.length>0?stack[stack.length-1]:el;
      if(node.type==='char'){
        target.insertAdjacentText('beforeend',node.ch);
      }else if(node.type==='open'){
        var span=document.createElement(node.tag);
        if(node.cls) span.className=node.cls;
        if(node.style) span.setAttribute('style',node.style);
        target.appendChild(span);
        stack.push(span);
      }else if(node.type==='close'){
        stack.pop();
      }
      idx++;
      var d=speed;
      if(node.type==='char'){
        if('\uFF0C\u3002\u3001\uFF1A\uFF1B\u2026\uFF01\uFF1F'.indexOf(node.ch)>=0) d=speed*3;
        else if('\u00B7\u2192\u2713'.indexOf(node.ch)>=0) d=speed*2;
        else if(node.ch===' ') d=speed*0.5;
      }else{
        d=0;
      }
      if(d>0) setTimeout(tick,d);
      else tick();
    }
    tick();
  });
}

/* --- SSE STREAM HANDLER --- */
function createSSEParser(callbacks){
  var buf='';
  var currentEvent='';
  var currentData='';

  function processLine(line){
    if(line===''){
      if(currentData){
        var parsed=null;
        try{parsed=JSON.parse(currentData)}catch(e){parsed={text:currentData}}
        if(callbacks[currentEvent]){
          callbacks[currentEvent](parsed);
        }
      }
      currentEvent='';
      currentData='';
      return;
    }
    if(line.indexOf('event:')=== 0){
      currentEvent=line.substring(6).trim();
    }else if(line.indexOf('data:')=== 0){
      var d=line.substring(5);
      if(d.charAt(0)===' ') d=d.substring(1);
      currentData=currentData?currentData+'\n'+d:d;
    }
  }

  return{
    feed:function(chunk){
      buf+=chunk;
      var lines=buf.split('\n');
      buf=lines.pop()||'';
      for(var i=0;i<lines.length;i++){
        processLine(lines[i]);
      }
    },
    flush:function(){
      if(buf) processLine(buf);
      processLine('');
      buf='';
    }
  };
}

/* --- PER-SKILL SSE STREAM --- */
function runSkillSSE(skillEndpoint,params,callbacks){
  return new Promise(function(resolve,reject){
    var collectedResult=null;

    var parser=createSSEParser({
      step:function(d){
        if(callbacks.onStep) callbacks.onStep(d.label);
      },
      delta:function(d){
        if(callbacks.onDelta) callbacks.onDelta(d.text);
      },
      result:function(d){
        collectedResult=d;
      },
      done:function(){
        if(callbacks.onDone) callbacks.onDone();
        resolve(collectedResult);
      },
      error:function(d){
        reject(new Error(d.message||'SSE error'));
      }
    });

    fetch(API_BASE+skillEndpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'text/event-stream'},
      body:JSON.stringify(params)
    }).then(function(res){
      if(!res.ok) throw new Error('HTTP '+res.status);
      var reader=res.body.getReader();
      var decoder=new TextDecoder();

      function pump(){
        return reader.read().then(function(result){
          if(result.done){
            parser.flush();
            return;
          }
          parser.feed(decoder.decode(result.value,{stream:true}));
          return pump();
        });
      }
      return pump();
    }).then(function(){
      resolve(collectedResult);
    }).catch(function(err){
      reject(err);
    });
  });
}

function mockStreamLines(lines,callbacks,targetTime){
  return new Promise(async function(resolve){
    var totalChars=0;
    lines.forEach(function(l){totalChars+=l.text.length});
    var breathTotal=targetTime*0.35;
    var preLineTotal=targetTime*0.10;
    var typeTotal=targetTime*0.55;
    var baseCharDelay=Math.max(20,Math.min(70,typeTotal/totalChars));
    var avgBreath=breathTotal/lines.length;
    var avgPreLine=preLineTotal/lines.length;

    for(var i=0;i<lines.length;i++){
      callbacks.onStep(lines[i].label);
      await delay(avgPreLine*(0.7+Math.random()*0.6));
      var text=lines[i].text;
      for(var c=0;c<text.length;c++){
        callbacks.onDelta(text[c]);
        var ch=text[c];
        var d=baseCharDelay;
        if('\uFF0C\u3002\u3001\uFF1A\uFF1B\u2026\uFF01\uFF1F'.indexOf(ch)>=0) d=baseCharDelay*3;
        else if('\u00B7\u2192\u2713'.indexOf(ch)>=0) d=baseCharDelay*2;
        else if(ch===' ') d=baseCharDelay*0.5;
        await delay(d);
      }
      var bm=lines[i].label==='result'?1.5:(lines[i].label==='eval'?1.2:1.0);
      await delay(avgBreath*bm*(0.7+Math.random()*0.6));
    }
    callbacks.onDone();
    resolve();
  });
}

function makeSkillCallbacks(skillKey){
  /*
   * Unified event queue: all SSE events (step + delta) are queued
   * and rendered sequentially with typewriter timing, regardless
   * of how fast the server sends data.
   */
  var eventQ=[];       /* [{type:'step',label:''}, {type:'char',ch:''}, {type:'done'}] */
  var processing=false;
  var currentTextSpan=null;
  var doneResolve=null;
  var BASE_CHAR=25;    /* ms per character – realistic LLM typing speed */
  var STEP_PAUSE=300;  /* ms pause when new step starts (breathing) */
  var PUNCT_MULT=3;    /* multiplier for Chinese punctuation */
  var SYMBOL_MULT=2.5;
  var SPACE_MULT=0.3;

  var _paused=false;

  function enqueue(evt){ eventQ.push(evt); if(!processing) drainQueue(); }

  function drainQueue(){
    if(processing) return;
    /* If paused, stop draining. Will be resumed by runAllSkills */
    if(_paused){ return; }
    if(eventQ.length===0){
      /* If server already sent done but queue was still draining, now finish */
      if(doneResolve){ doneResolve(); doneResolve=null; }
      return;
    }
    processing=true;
    var evt=eventQ.shift();

    if(evt.type==='step'){
      /* Create new think-line with breathing pause */
      var container=document.getElementById('skill-lines-'+skillKey);
      if(container){
        var prevCursor=container.querySelector('.think-cursor');
        if(prevCursor) prevCursor.remove();

        var line=document.createElement('div');
        line.className='think-line';
        var labelSpan=document.createElement('span');
        labelSpan.className='tl-label '+(evt.label||'search');
        labelSpan.textContent=LABEL_MAP[evt.label]||evt.label||'检索';
        line.appendChild(labelSpan);

        var textSpan=document.createElement('span');
        textSpan.className='tl-text';
        line.appendChild(textSpan);

        var cursor=document.createElement('span');
        cursor.className='think-cursor';
        line.appendChild(cursor);

        container.appendChild(line);
        requestAnimationFrame(function(){line.classList.add('show')});
        scrollBottom();
        currentTextSpan=textSpan;
      }
      /* Breathing pause before next event */
      var pause=STEP_PAUSE*(0.7+Math.random()*0.6);
      setTimeout(function(){processing=false;drainQueue()},pause);

    }else if(evt.type==='char'){
      if(currentTextSpan){
        currentTextSpan.insertAdjacentText('beforeend',evt.ch);
        scrollBottom();
      }
      var ch=evt.ch;
      var d=BASE_CHAR;
      if('\uFF0C\u3002\u3001\uFF1A\uFF1B\u2026\uFF01\uFF1F'.indexOf(ch)>=0) d=BASE_CHAR*PUNCT_MULT;
      else if('\u00B7\u2192\u2713\u2714'.indexOf(ch)>=0) d=BASE_CHAR*SYMBOL_MULT;
      else if(ch===' ') d=BASE_CHAR*SPACE_MULT;
      else if(ch==='\n') d=BASE_CHAR*0.1;
      /* Slight random jitter for natural feel */
      d=d*(0.8+Math.random()*0.4);
      setTimeout(function(){processing=false;drainQueue()},d);

    }else if(evt.type==='finish'){
      /* Done: flush remaining chars instantly, remove cursor */
      while(eventQ.length>0){
        var e=eventQ.shift();
        if(e.type==='char'&&currentTextSpan){
          currentTextSpan.insertAdjacentText('beforeend',e.ch);
        }else if(e.type==='step'){
          /* Create the line but don't animate */
          var container2=document.getElementById('skill-lines-'+skillKey);
          if(container2){
            var pc=container2.querySelector('.think-cursor');
            if(pc) pc.remove();
            var ln=document.createElement('div');ln.className='think-line show';
            var ls=document.createElement('span');ls.className='tl-label '+(e.label||'search');
            ls.textContent=LABEL_MAP[e.label]||e.label||'检索';ln.appendChild(ls);
            var ts=document.createElement('span');ts.className='tl-text';ln.appendChild(ts);
            container2.appendChild(ln);
            currentTextSpan=ts;
          }
        }
      }
      var container3=document.getElementById('skill-lines-'+skillKey);
      if(container3){
        var lastCursor=container3.querySelector('.think-cursor');
        if(lastCursor) lastCursor.remove();
      }
      var statusEl=document.getElementById('skill-status-'+skillKey);
      if(statusEl) statusEl.classList.add('done');
      processing=false;
      if(doneResolve){ doneResolve(); doneResolve=null; }
    }
  }

  var self={
    get paused(){ return _paused; },
    set paused(v){ _paused=v; },
    resumeQueue:function(){ drainQueue(); },
    onStep:function(label){
      enqueue({type:'step',label:label});
    },
    onDelta:function(text){
      if(!text) return;
      for(var i=0;i<text.length;i++){
        enqueue({type:'char',ch:text[i]});
      }
    },
    onDone:function(){
      enqueue({type:'finish'});
    },
    whenVisualDone:function(){
      return new Promise(function(resolve){
        if(eventQ.length===0&&!processing){ resolve(); return; }
        doneResolve=resolve;
      });
    }
  };
  return self;
}

async function runAllSkills(cat,cap,city,innerEl){
  var params={category:cat,capacity:cap,city:city};
  var results={};
  var skillCallbacks={}; /* cb objects keyed by skill key */
  var mockFns=[runMockBuyerMatch,runMockMarketEstimate,runMockOrderForecast,runMockCompetition];

  /* Launch all 4 SSE fetches in parallel (for network speed).
     Each callback queue is paused — data accumulates silently. */
  var sseResultPromises=[];
  for(var k=0;k<SKILL_DEFS.length;k++){
    (function(idx){
      var sd=SKILL_DEFS[idx];
      var cb=makeSkillCallbacks(sd.key);
      cb.paused=true;
      skillCallbacks[sd.key]=cb;
      var p=runSkillSSE(sd.endpoint,params,cb).then(function(result){
        return{ok:true,result:result,cb:cb};
      }).catch(function(err){
        console.log('Skill SSE failed ('+sd.key+'):',err.message,', using MOCK');
        return{ok:false,err:err,skillIdx:idx};
      });
      sseResultPromises.push(p);
    })(k);
  }

  /* Serial visual display: show one skill at a time, wait for its
     typewriter queue to fully drain, then move to the next skill. */
  for(var si=0;si<SKILL_DEFS.length;si++){
    var sd=SKILL_DEFS[si];

    /* Create and reveal the skill section */
    var section=createSkillSection(sd);
    innerEl.appendChild(section);
    requestAnimationFrame(function(s){return function(){s.classList.add('show')}}(section));
    scrollBottom();

    /* Unpause this skill's queue so typewriter starts */
    var cb=skillCallbacks[sd.key];
    if(cb){ cb.paused=false; cb.resumeQueue(); }

    /* Wait for this skill's SSE data AND visual queue to finish */
    var sseResult=await sseResultPromises[si];
    if(!sseResult.ok){
      /* SSE failed — clear partial lines and run MOCK */
      var container=document.getElementById('skill-lines-'+sd.key);
      if(container) container.innerHTML='';
      var statusEl=document.getElementById('skill-status-'+sd.key);
      if(statusEl) statusEl.classList.remove('done');
      var cb2=makeSkillCallbacks(sd.key);
      results[sd.key]=await mockFns[si](cat,cap,city,cb2);
    }else{
      /* Wait for visual queue to drain (typewriter finishes) */
      await sseResult.cb.whenVisualDone();
      results[sd.key]=sseResult.result;
    }

    /* Small pause between skills for breathing room */
    if(si<SKILL_DEFS.length-1){
      await delay(500);
    }
  }

  return results;
}

  var barColors=['#ddd','#ccc','var(--blue)','var(--blue)','var(--orange)','var(--orange)','var(--orange-dark)','var(--green)'];

  revenueData.forEach(function(m,idx){
    var h=maxVal>0?Math.round((m.value/maxVal)*maxH):0;
    if(m.value>0&&h<4) h=4;
    var color=barColors[idx]||'var(--blue)';
    var bar=document.createElement('div');
    bar.className='rev-bar';
    bar.style.cssText='height:0;background:'+color;
    bar.innerHTML='<span class="rev-bar-val">$'+m.value+'K</span>';
    bar.setAttribute('data-h',h);
    chart.appendChild(bar);
  });
  p4.body.appendChild(chart);
  scrollBottom();

  /* Animate bars */
  await delay(400);
  var barEls=chart.querySelectorAll('.rev-bar');
  for(var b=0;b<barEls.length;b++){
    var targetH=parseInt(barEls[b].getAttribute('data-h'))||0;
    barEls[b].style.height=targetH+'px';
    await delay(250);
    if(revenueData[b]&&revenueData[b].value>0){
      barEls[b].querySelector('.rev-bar-val').classList.add('show');
    }
    scrollBottom();
  }
  await delay(800);

  /* Partnership card */
  var partnerData=(td&&td.partnership)||{buyer:'GlobalTech',terms:'框架协议 $18K/月'};
  var pc=document.createElement('div');
  pc.className='partnership-card';
  pc.innerHTML='<div class="pc-icon">\uD83E\uDD1D</div>'
    +'<div class="pc-body"><div class="pc-title">长期OEM合作建立</div><div class="pc-detail">'+partnerData.buyer+' · '+partnerData.terms+'</div></div>';
  p4.body.appendChild(pc);
  await delay(600);
  pc.classList.add('show');
  scrollBottom();

  p4.el.classList.remove('active');p4.el.classList.add('done');
  scrollBottom();
}

function createPhase(week,title,desc){
  var el=document.createElement('div');
  el.className='tl-phase';
  var body=document.createElement('div');
  body.className='tl-body';
  el.innerHTML='<div class="tl-dot"></div><div class="tl-header"><span class="tl-week">'+week+'</span><span class="tl-title">'+title+'</span></div>';
  var descEl=document.createElement('div');
  descEl.className='tl-desc';
  descEl.textContent=desc;
  body.appendChild(descEl);
  el.appendChild(body);
  return {el:el,body:body};
}

/* --- SUBMIT --- */
async function handleSubmit(){
  var btn=document.getElementById('submitBtn');
  var ph=document.getElementById('inputPhone').value.trim();
  var co=document.getElementById('inputCompany').value.trim();
  var ct=document.getElementById('inputContact').value.trim();
  var ok=true;
  if(!/^1[3-9]\d{9}$/.test(ph)){document.getElementById('inputPhone').classList.add('error');ok=false}
  if(!co||co.length<2){document.getElementById('inputCompany').classList.add('error');ok=false}
  if(!ct){document.getElementById('inputContact').classList.add('error');ok=false}
  if(!ok){showToast('请完善联系信息','error');return}

  btn.disabled=true;btn.textContent='提交中...';
  addMsg('user',co+' / '+ct+' / '+ph.replace(/(\d{3})\d{4}(\d{4})/,'$1****$2'));

  addMsg('thinking');
  await delay(800);
  removeThinking();

  try{
    var payload={company_name:co,contact:ct,phone:ph,country:'CN',category:savedCat,capacity:savedCap,city:savedCity};
    var res=await fetch(API_BASE+'/api/invite/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(res.ok){
      var rd=await res.json();
      addMsg('ai','提交成功。你的专属顾问会在 2 小时内联系你，协助完成建档并邀请你加入「'+savedCat+'」行业社群。');
      scrollBottom();
      await delay(2000);
      window.location.href=API_BASE+'/static/onboarding.html?factory_id='+(rd.factory_id||'');
    }else{
      var ed=await res.json().catch(function(){return{}});
      addMsg('ai','提交遇到问题：'+(ed.detail||ed.error||'请稍后重试'));
      btn.disabled=false;btn.textContent='加入社群 · 开始建档';
    }
  }catch(e){
    addMsg('ai','网络连接出错，请检查网络后重试。');
    btn.disabled=false;btn.textContent='加入社群 · 开始建档';
  }
  scrollBottom();
}
</script>
